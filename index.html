<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MySelf Collage · Olai G.V</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼</text></svg>" />

    <!-- Open Graph (actualiza las URLs con tu dominio real) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="MySelf Collage · Olai G.V" />
    <meta property="og:description" content="Una galería personal con animaciones GSAP. Scroll para explorar." />
    <meta property="og:image"       content="https://tu-dominio.com/IMG/Img1.png" />
    <meta property="og:url"         content="https://tu-dominio.com/" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="MySelf Collage · Olai G.V" />
    <meta name="twitter:description" content="Una galería personal con animaciones GSAP. Scroll para explorar." />
    <meta name="twitter:image"       content="https://tu-dominio.com/IMG/Img1.png" />

    <!-- CSS -->
    <link rel="stylesheet" href="./CSS/style.css" />

    <!-- GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  </head>
  <body>
    <!-- Cursor personalizado -->
    <div class="cursor"></div>

    <section class="personal-collage">
      <h1 class="title">Olai G.V</h1>

      <div class="collage">
        <!-- Columna Izquierda -->
        <div class="col">
          <div class="image">
            <img src="./IMG/Img1.png" alt="Foto personal 1" />
          </div>
          <div class="image">
            <img src="./IMG/Img2.png" alt="Foto personal 2" />
          </div>
          <div class="image">
            <img src="./IMG/Img3.png" alt="Foto personal 3" />
          </div>
        </div>

        <!-- Columna Central -->
        <div class="col">
          <div class="image">
            <img src="./IMG/Img4.png" alt="Foto personal 4" />
          </div>
          <div class="image">
            <img src="./IMG/Img5.png" alt="Foto personal 5" />
          </div>
          <div class="image">
            <img src="./IMG/Img6.png" alt="Foto personal 6" />
          </div>
        </div>

        <!-- Columna Derecha -->
        <div class="col">
          <div class="image">
            <img src="./IMG/Img7.png" alt="Foto personal 7" />
          </div>
          <div class="image">
            <img src="./IMG/Img8.png" alt="Foto personal 8" />
          </div>
          <div class="image">
            <img src="./IMG/Img9.png" alt="Foto personal 9" />
          </div>
        </div>
      </div>
    </section>

    <!-- JavaScript -->
    <script src="./JS/script.js"></script>
  </body>
</html>
